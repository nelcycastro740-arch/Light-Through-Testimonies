<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testimonies | Light Through Testimonies</title>
  <style>
    * {
      box-sizing: border-box;
    }
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff8f3;
  color: #4a3a33;
}

header {
  text-align: center;
  padding: 30px 16px 20px;
  background: #f7e3d7;
  border-bottom: 1px solid #ead3c5;
}

header h1 {
  margin: 0;
  font-size: 2rem;
}

header p {
  margin: 10px 0 0;
  color: #7a5b4c;
}

nav {
  text-align: center;
  padding: 14px;
  background: #fff3eb;
  border-bottom: 1px solid #f0ddd1;
}

nav a {
  text-decoration: none;
  color: #8a5a44;
  font-weight: bold;
  margin: 0 12px;
}

.container {
  width: min(92%, 900px);
  margin: 30px auto;
}

.section-title {
  font-size: 1.4rem;
  margin: 0 0 16px;
  color: #5a4034;
}

.message {
  text-align: center;
  color: #7a5b4c;
  padding: 20px;
}

.featured-card {
  background: linear-gradient(180deg, #fff7f0 0%, #ffffff 100%);
  border: 1px solid #f0ddd1;
  border-radius: 18px;
  padding: 24px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.06);
  margin-bottom: 30px;
}

.featured-label {
  display: inline-block;
  background: #8a5a44;
  color: white;
  font-size: 0.85rem;
  font-weight: bold;
  padding: 6px 12px;
  border-radius: 999px;
  margin-bottom: 14px;
}

.featured-card h3 {
  margin: 0 0 8px;
  color: #5a4034;
  font-size: 1.5rem;
}

.featured-card .meta {
  color: #9a7a69;
  font-size: 0.92rem;
  margin-bottom: 12px;
}

.featured-card .story {
  line-height: 1.8;
  white-space: pre-wrap;
}

.testimony-card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.06);
  margin-bottom: 22px;
}

.testimony-card h3 {
  margin: 0 0 8px;
  color: #5a4034;
}

.meta {
  color: #9a7a69;
  font-size: 0.92rem;
  margin-bottom: 12px;
}

.story {
  line-height: 1.7;
  white-space: pre-wrap;
}

.actions {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-top: 16px;
  flex-wrap: wrap;
}

.like-btn {
  border: none;
  background: #8a5a44;
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.like-btn:hover {
  opacity: 0.92;
}

.like-count {
  color: #7a5b4c;
  font-size: 0.95rem;
}

.comment-note {
  color: #9a7a69;
  font-size: 0.9rem;
}

footer {
  text-align: center;
  padding: 24px 16px 40px;
  color: #7b6a61;
}
  </style>
</head>
<body>
  <header>
    <h1>Community Testimonies</h1>
    <p>Stories of faith, healing, hope, and growth.</p>
  </header>
  <main class="container">
    <section id="featuredSection">
      <h2 class="section-title">Featured Testimony</h2>
      <div id="featuredTestimony" class="message">Loading featured testimony...</div>
    </section>
<section style="margin-top: 34px;">
  <h2 class="section-title">All Testimonies</h2>
  <div id="testimoniesList" class="message">Loading testimonies...</div>
</section>
  </main>
  <footer>
    © 2026 Light Through Testimonies
  </footer>
  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzhgY33cuzLBvzCEWQU9vEd1r8vU0VHa_7w5rlZFpbS17fHKRQ8w9SG2po--RKrp3Y7/exec";
    const testimoniesList = document.getElementById("testimoniesList");
    const featuredTestimony = document.getElementById("featuredTestimony");

    async function loadTestimonies() {
      try {
        const response = await fetch(`${scriptURL}?action=getTestimonies`);
        const testimonies = await response.json();

        if (!testimonies.length) {
          featuredTestimony.innerHTML = "<div class='message'>No featured testimony yet.</div>";
          testimoniesList.innerHTML = "<div class='message'>No approved testimonies yet.</div>";
          return;
        }

        const featured = testimonies[0];

        featuredTestimony.innerHTML = `
          <div class="featured-card">
            <div class="featured-label">Featured</div>
            <h3>${escapeHTML(featured.title)}</h3>
            <div class="meta">Shared by ${escapeHTML(featured.name || "Anonymous")}</div>
            <div class="story">${escapeHTML(featured.story)}</div>
            <div class="actions">
              <button class="like-btn" onclick="likeTestimony('featured_0')">♥ Like</button>
              <span class="like-count">Likes: <span id="likes-featured_0">${getLikes("featured_0")}</span></span>
            </div>
          </div>
        `;

        testimoniesList.innerHTML = testimonies.map((item, index) => `
          <div class="testimony-card">
            <h3>${escapeHTML(item.title)}</h3>
            <div class="meta">Shared by ${escapeHTML(item.name || "Anonymous")}</div>
            <div class="story">${escapeHTML(item.story)}</div>
            <div class="actions">
              <button class="like-btn" onclick="likeTestimony('testimony_${index}')">♥ Like</button>
              <span class="like-count">Likes: <span id="likes-testimony_${index}">${getLikes(`testimony_${index}`)}</span></span>
              <span class="comment-note">Comments coming soon</span>
            </div>
          </div>
        `).join("");
      } catch (error) {
        featuredTestimony.innerHTML = "<div class='message'>Unable to load featured testimony right now.</div>";
        testimoniesList.innerHTML = "<div class='message'>Unable to load testimonies right now.</div>";
        console.error(error);
      }
    }

    function likeTestimony(id) {
      const currentLikes = getLikes(id);
      const newLikes = currentLikes + 1;
      localStorage.setItem("likes_" + id, newLikes);
      const likeEl = document.getElementById("likes-" + id);
      if (likeEl) {
        likeEl.textContent = newLikes;
      }
    }

    function getLikes(id) {
      return Number(localStorage.getItem("likes_" + id) || 0);
    }

    function escapeHTML(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadTestimonies();
  </script>
</body>
</html>
:::
