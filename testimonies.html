<!DOCTYPE html>
<html>
<head>
  <title>Testimonies | Light Through Testimonies</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
    }

    header {
      background-color: #6a5acd;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background-color: #333;
      padding: 12px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      padding: 30px 20px;
    }

    .testimony-card {
      background: #fff;
      padding: 20px;
      margin: 20px auto;
      max-width: 700px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: left;
    }

    footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Testimonies</h1>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="testimonies.html">Testimonies</a>
    <a href="submit.html">Submit</a>
    <a href="#">About</a>
  </nav>

  <div class="container">
    <div id="testimonies-list">
      <p>Loading testimonies...</p>
    </div>
  </div>

  <footer>
    <p>© 2026 Light Through Testimonies</p>
  </footer>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzhgY33cuzLBvzCEWQU9vEd1r8vU0VHa_7w5rlZFpbS17fHKRQ8w9SG2po--RKrp3Y7/exec";

    async function loadTestimonies() {
      const container = document.getElementById("testimonies-list");

      try {
        const response = await fetch(scriptURL);
        const data = await response.json();

        if (!data.length) {
          container.innerHTML = "<p>No testimonies yet.</p>";
          return;
        }

        container.innerHTML = data.map(item => `
          <div class="testimony-card">
            <h3>${item.title}</h3>
            <p><strong>${item.name}</strong></p>
            <p>${item.story.replace(/\n/g, "<br>")}</p>
          </div>
        `).join("");
      } catch (error) {
        container.innerHTML = "<p>Error loading testimonies.</p>";
        console.error(error);
      }
    }

    loadTestimonies();
  </script>

</body>
</html>
